access_log  /dev/stdout;
error_log   /dev/stderr;

server
{
	server_names default.org www.default.org;

	listen						8080;

	index						index.html;

	client_max_body_size		100000;

	error_page 404				error_pages/404.html;
	error_page 500 502 503 504	error_pages/50x.html;

	root						/var/www/html/;

	keepalive_timeout			15;

	location / {
		index	index.html;
		limit_except GET POST {
			allow	192.168.1.0/32;
			deny	all;
		}
		allow_cgi			.py;
	}

	location /kapouet {
		autoindex			on;
		allow_cgi			.py;
	}

	location /uploads {
		root			/var/www/html;
		autoindex		on;
	}

	location /cgi {
		root			/var/www/html;
		allow_cgi		.py;
	}

	location /reroute {
		return 301 /uploads/;
	}
}
